<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background tile -->
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- Outer vault ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#5C6BC0" stroke-width="1.8"/>
  <!-- Inner vault ring -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#7986CB" stroke-width="1.2"/>
  <!-- Cross handle -->
  <line x1="16" y1="9" x2="16" y2="23" stroke="#7986CB" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="9" y1="16" x2="23" y2="16" stroke="#7986CB" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Bolt studs at cardinal points -->
  <circle cx="16" cy="5" r="1.6" fill="#5C6BC0"/>
  <circle cx="27" cy="16" r="1.6" fill="#5C6BC0"/>
  <circle cx="16" cy="27" r="1.6" fill="#5C6BC0"/>
  <circle cx="5"  cy="16" r="1.6" fill="#5C6BC0"/>
  <!-- Center pivot -->
  <circle cx="16" cy="16" r="2.4" fill="#5C6BC0"/>
</svg>
