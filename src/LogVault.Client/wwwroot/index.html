<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LogVault</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="LogVault.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="splash-screen">
            <div class="splash-logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="72" height="72">
                    <circle cx="32" cy="32" r="22" fill="none" stroke="#5C6BC0" stroke-width="3.5"/>
                    <circle cx="32" cy="32" r="14" fill="none" stroke="#7986CB" stroke-width="2.2"/>
                    <line x1="32" y1="18" x2="32" y2="46" stroke="#7986CB" stroke-width="3" stroke-linecap="round"/>
                    <line x1="18" y1="32" x2="46" y2="32" stroke="#7986CB" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="32" cy="10" r="3" fill="#5C6BC0"/>
                    <circle cx="54" cy="32" r="3" fill="#5C6BC0"/>
                    <circle cx="32" cy="54" r="3" fill="#5C6BC0"/>
                    <circle cx="10" cy="32" r="3" fill="#5C6BC0"/>
                    <circle cx="32" cy="32" r="4.5" fill="#5C6BC0"/>
                </svg>
            </div>
            <div class="splash-title">LogVault</div>
            <div class="splash-subtitle">Secure log ingestion &amp; analysis</div>
            <div class="splash-progress-track">
                <div class="splash-progress-fill loading-progress"></div>
            </div>
            <div class="splash-percentage loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
